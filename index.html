<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSANC</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none;
            user-select: none;
        }

        /* 🔵 Курсор */
        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            pointer-events: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 30px rgba(255,255,255,0.4);
        }

        .cursor-ring {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 9998;
            pointer-events: none;
            transition: width 0.1s, height 0.1s, border-color 0.1s;
        }

        /* 🎬 Интро */
        .intro {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            z-index: 100;
        }
        .intro.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .text-wrapper {
            display: flex;
            font-size: clamp(3rem, 12vw, 7rem);
            font-weight: 200;
            letter-spacing: 0.12em;
        }

        .letter {
            display: inline-block;
            opacity: 0;
            transform: translateY(35px);
            animation: fadeSlideUp 0.85s cubic-bezier(0.23,1,0.32,1) forwards;
        }
        .letter:nth-child(1) { animation-delay: 0.1s; }
        .letter:nth-child(2) { animation-delay: 0.2s; }
        .letter:nth-child(3) { animation-delay: 0.3s; }
        .letter:nth-child(4) { animation-delay: 0.4s; }
        .letter:nth-child(5) { animation-delay: 0.5s; }

        @keyframes fadeSlideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .letter:hover { color: #b0b0b0; transition: color 0.2s ease; }

        /* 🟣 Подсказка */
        .click-hint {
            position: absolute;
            bottom: 20%;
            font-size: 0.9rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            opacity: 0;
            animation: hintPulse 2s ease-in-out infinite;
            pointer-events: none;
        }
        .click-hint.show { opacity: 1; }
        @keyframes hintPulse {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.45; }
        }

        /* ⚙️ Кнопка настроек */
        .settings-toggle {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            opacity: 0;
            pointer-events: auto;
            transition: opacity 0.4s ease, background 0.2s;
        }
        .settings-toggle.show { opacity: 1; }
        .settings-toggle:hover { background: rgba(255,255,255,0.18); }
        .settings-toggle svg {
            width: 18px;
            height: 18px;
            fill: rgba(255,255,255,0.7);
            transition: transform 0.3s ease;
        }
        .settings-toggle.active svg { transform: rotate(180deg); }

        /* ⚙️ Панель настроек */
        .settings-panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 18px 28px;
            z-index: 50;
            display: flex;
            gap: 32px;
            align-items: center;
            transition: transform 0.5s cubic-bezier(0.23,1,0.32,1), opacity 0.4s ease;
            opacity: 0;
            pointer-events: auto;
        }
        .settings-panel.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .setting-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .setting-label {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
        }
        .setting-value {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.85);
            font-weight: 300;
            min-width: 40px;
            text-align: center;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: none;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }

        /* 🟢 Osu-контейнер */
        .osu-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 5;
        }

        /* 🔴 КРУГ С НОМЕРОМ как в osu! */
        .osu-circle {
            position: absolute;
            border-radius: 50%;
            pointer-events: auto;
            cursor: none;
            /* Двойная обводка */
            box-shadow: 
                0 0 0 3px rgba(0,0,0,0.8),
                0 0 0 5px rgba(255,255,255,0.9),
                0 0 20px rgba(255,255,255,0.4);
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), rgba(0,0,0,0.8));
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: circleAppear 0.4s ease-out forwards;
        }

        @keyframes circleAppear {
            0% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Номер внутри круга */
        .circle-number {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,255,255,0.4);
            pointer-events: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            letter-spacing: 0.05em;
        }

        /* Подходной круг (approach circle) */
        .approach-circle {
            position: absolute;
            border: 3px solid rgba(255,255,255,0.7);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(2.5);
            opacity: 0;
            pointer-events: none;
            animation: approachAnim var(--approach-time) ease-out forwards;
        }

        @keyframes approachAnim {
            0% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        /* 💥 Эффект попадания */
        .hit-effect {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .hit-effect::before {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.9);
            animation: hitCheck 0.3s ease-out forwards;
        }
        @keyframes hitCheck {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        /* Класс для анимации исчезновения при клике */
        .osu-circle.hit {
            animation: circleHit 0.15s ease-out forwards !important;
        }
        @keyframes circleHit {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* ✨ Combo counter */
        .combo {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.6);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .combo.show { opacity: 1; }
        .combo.bump {
            animation: comboBump 0.15s ease-out;
        }
        @keyframes comboBump {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.3); color: rgba(255,255,255,1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        /* Flash */
        .flash {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.15);
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            animation: flashAnim 0.5s ease-out forwards;
        }
        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <div class="intro" id="intro">
        <div class="text-wrapper" id="text-wrapper">
            <span class="letter">D</span><span class="letter">S</span><span class="letter">A</span><span class="letter">N</span><span class="letter">C</span>
        </div>
        <div class="click-hint" id="click-hint">нажми</div>
    </div>

    <div class="osu-container" id="osu-container"></div>
    <div class="combo" id="combo">combo x0</div>

    <div class="settings-toggle" id="settings-toggle">
        <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
    </div>

    <div class="settings-panel" id="settings-panel">
        <div class="setting-group">
            <span class="setting-label">Скорость</span>
            <input type="range" id="speed-slider" min="20" max="400" value="100">
            <span class="setting-value" id="speed-value">100</span>
        </div>
        <div class="setting-group">
            <span class="setting-label">Размер</span>
            <input type="range" id="size-slider" min="8" max="60" value="25">
            <span class="setting-value" id="size-value">25</span>
        </div>
    </div>

    <script>
        const cursorDot      = document.getElementById('cursor-dot');
        const cursorRing     = document.getElementById('cursor-ring');
        const intro          = document.getElementById('intro');
        const textWrapper    = document.getElementById('text-wrapper');
        const clickHint      = document.getElementById('click-hint');
        const osuContainer   = document.getElementById('osu-container');
        const settingsToggle = document.getElementById('settings-toggle');
        const settingsPanel  = document.getElementById('settings-panel');
        const speedSlider    = document.getElementById('speed-slider');
        const sizeSlider     = document.getElementById('size-slider');
        const speedValue     = document.getElementById('speed-value');
        const sizeValue      = document.getElementById('size-value');
        const comboEl        = document.getElementById('combo');

        let activeDots = 0, started = false, spawnInterval = null;
        let baseSize = 25, baseSpeed = 100, settingsVisible = false;
        let combo = 0, circleCounter = 1;

        /* ——— Курсор ——— */
        document.addEventListener('mousemove', e => {
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top  = e.clientY + 'px';
            setTimeout(() => {
                cursorRing.style.left = e.clientX + 'px';
                cursorRing.style.top  = e.clientY + 'px';
            }, 8);
        });

        document.addEventListener('mousedown', () => {
            cursorDot.style.width = '6px'; cursorDot.style.height = '6px';
            cursorRing.style.width = '24px'; cursorRing.style.height = '24px';
            cursorRing.style.borderColor = 'rgba(255,255,255,0.85)';
        });
        document.addEventListener('mouseup', () => {
            cursorDot.style.width = '8px'; cursorDot.style.height = '8px';
            cursorRing.style.width = '30px'; cursorRing.style.height = '30px';
            cursorRing.style.borderColor = 'rgba(255,255,255,0.3)';
        });

        /* ——— Клик по DSANC ——— */
        textWrapper.addEventListener('click', startOsuScene, { once: true });

        function startOsuScene() {
            if (started) return;
            started = true;

            const flash = document.createElement('div');
            flash.className = 'flash';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 500);

            setTimeout(() => intro.classList.add('hidden'), 80);

            setTimeout(() => {
                settingsToggle.classList.add('show');
                settingsPanel.classList.add('show');
                settingsVisible = true;
                settingsToggle.classList.add('active');
            }, 350);

            setTimeout(() => {
                spawnInterval = setInterval(createOsuCircle, baseSpeed);
                for (let i = 0; i < 10; i++) setTimeout(createOsuCircle, i * 70);
            }, 250);
        }

        setTimeout(() => clickHint.classList.add('show'), 1300);

        /* ——— Toggle настроек ——— */
        settingsToggle.addEventListener('click', () => {
            settingsVisible = !settingsVisible;
            if (settingsVisible) {
                settingsPanel.classList.add('show');
                settingsToggle.classList.add('active');
            } else {
                settingsPanel.classList.remove('show');
                settingsToggle.classList.remove('active');
            }
        });

        /* ——— Создание круга как в osu! ——— */
        function createOsuCircle() {
            if (activeDots > 150) return;

            const circle = document.createElement('div');
            circle.className = 'osu-circle';

            const size = Math.random() * baseSize + 50; // 50-110px
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';

            const x = Math.random() * 80 + 10; // 10-90%
            const y = Math.random() * 70 + 15; // 15-85%
            circle.style.left = x + '%';
            circle.style.top = y + '%';

            // Номер
            const number = document.createElement('span');
            number.className = 'circle-number';
            number.textContent = circleCounter++;
            circle.appendChild(number);

            // Подходной круг (approach circle)
            const approach = document.createElement('div');
            approach.className = 'approach-circle';
            approach.style.width = size + 'px';
            approach.style.height = size + 'px';
            const approachTime = 1.5 + Math.random(); // 1.5-2.5 сек
            approach.style.setProperty('--approach-time', approachTime + 's');
            circle.appendChild(approach);

            // Цветные круги (иногда)
            if (Math.random() > 0.8) {
                const hue = 190 + Math.random() * 50; // голубой/синий
                circle.style.boxShadow = `
                    0 0 0 3px rgba(0,0,0,0.8),
                    0 0 0 5px hsla(${hue}, 90%, 70%, 0.95),
                    0 0 25px hsla(${hue}, 90%, 60%, 0.6)
                `;
                approach.style.borderColor = `hsla(${hue}, 90%, 80%, 0.8)`;
            }

            // 💥 КЛИК по кругу
            circle.addEventListener('click', (e) => {
                e.stopPropagation();
                hitCircle(circle);
            });

            osuContainer.appendChild(circle);
            activeDots++;

            // Автоудаление если не кликнули
            setTimeout(() => {
                if (circle.parentNode && !circle.classList.contains('hit')) {
                    circle.remove();
                    activeDots--;
                    resetCombo();
                }
            }, approachTime * 1000);
        }

        function hitCircle(circle) {
            if (circle.classList.contains('hit')) return;
            circle.classList.add('hit');

            // Эффект галочки
            const effect = document.createElement('div');
            effect.className = 'hit-effect';
            effect.style.width = circle.offsetWidth + 'px';
            effect.style.height = circle.offsetHeight + 'px';
            circle.appendChild(effect);

            setTimeout(() => effect.remove(), 300);

            // Удаляем круг
            setTimeout(() => {
                circle.remove();
                activeDots--;
            }, 150);

            // Combo
            addCombo();
        }

        function addCombo() {
            combo++;
            comboEl.textContent = `combo x${combo}`;
            comboEl.classList.add('show');
            comboEl.classList.remove('bump');
            void comboEl.offsetWidth;
            comboEl.classList.add('bump');
        }

        function resetCombo() {
            combo = 0;
            comboEl.classList.remove('show');
        }

        /* ——— Настройки ——— */
        speedSlider.addEventListener('input', () => {
            const val = +speedSlider.value;
            baseSpeed = 420 - val;
            speedValue.textContent = Math.round((val / 400) * 100);
            clearInterval(spawnInterval);
            spawnInterval = setInterval(createOsuCircle, baseSpeed);
        });

        sizeSlider.addEventListener('input', () => {
            baseSize = +sizeSlider.value;
            sizeValue.textContent = baseSize;
        });
    </script>
</body>
</html>
