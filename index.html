<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSANC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            height: 100vh;
            overflow: hidden;
            cursor: none;
        }

        .cursor-dot {
            position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%;
            transform: translate(-50%, -50%); z-index: 9999; pointer-events: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 30px rgba(255,255,255,0.4);
        }
        .cursor-ring {
            position: fixed; width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%; transform: translate(-50%, -50%); z-index: 9998; pointer-events: none;
            transition: width 0.1s, height 0.1s, border-color 0.1s;
        }

        .main-container {
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            gap: 25px;  
            z-index: 100;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .main-container.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        .text-wrapper {
            display: flex; 
            font-size: clamp(4rem, 15vw, 10rem);
            font-weight: 700;
            letter-spacing: 0.08em; 
            cursor: none; 
            transition: transform 0.3s ease;
        }
        .text-wrapper:hover { transform: scale(1.02); }

        .letter {
            display: inline-block; 
            opacity: 0; 
            transform: translateY(35px);
            font-family: 'Cinzel Decorative', serif;
            background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0088ff, #ff00ff, #ff0000);
            background-size: 400% 100%; 
            -webkit-background-clip: text; 
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeSlideUp 0.85s cubic-bezier(0.23,1,0.32,1) forwards, rgbFlow 4s linear infinite;
            animation-delay: var(--delay), var(--delay);
            filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
        }
        .letter:nth-child(1) { --delay: 0.1s; }
        .letter:nth-child(2) { --delay: 0.2s; }
        .letter:nth-child(3) { --delay: 0.3s; }
        .letter:nth-child(4) { --delay: 0.4s; }
        .letter:nth-child(5) { --delay: 0.5s; }

        @keyframes fadeSlideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes rgbFlow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        .social-links { 
            display: flex; 
            gap: 25px; 
            opacity: 0; 
            animation: fadeIn 1s ease 0.8s forwards;
            justify-content: center;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        .social-link {
            width: 60px; 
            height: 60px; 
            border: 2px solid rgba(255,255,255,0.25); 
            border-radius: 50%;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease;
            cursor: none; 
            text-decoration: none; 
            position: relative;
        }
        .social-link:hover {
            border-color: rgba(255,255,255,0.9); 
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 8px 25px rgba(255,255,255,0.25);
        }
        .social-link svg { 
            width: 28px; 
            height: 28px; 
            fill: rgba(255,255,255,0.85); 
            transition: fill 0.3s; 
        }
        .social-link:hover svg { fill: #fff; }
        .social-link.youtube:hover { 
            border-color: #ff0000; 
            box-shadow: 0 8px 25px rgba(255,0,0,0.4); 
        }
        .social-link.discord:hover { 
            border-color: #5865F2; 
            box-shadow: 0 8px 25px rgba(88,101,242,0.4); 
        }

        .tooltip {
            position: absolute; 
            bottom: -30px; 
            font-size: 0.7rem; 
            letter-spacing: 0.15em;
            text-transform: uppercase; 
            color: rgba(255,255,255,0.5); 
            opacity: 0;
            transform: translateY(-10px); 
            transition: all 0.3s ease; 
            pointer-events: none; 
            white-space: nowrap;
        }
        .social-link:hover .tooltip { opacity: 1; transform: translateY(0); }

        .dvd-bounce {
            position: fixed;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 30px #0f0;
            z-index: 0;
            pointer-events: none;
            white-space: pre;
            line-height: 1.2;
            transition: color 0.3s, text-shadow 0.3s;
            opacity: 0.7;
        }
        .dvd-bounce.color-1 { color: #0f0; text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
        .dvd-bounce.color-2 { color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
        .dvd-bounce.color-3 { color: #f0f; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; }
        .dvd-bounce.color-4 { color: #ff0; text-shadow: 0 0 10px #ff0, 0 0 20px #ff0; }
        .dvd-bounce.color-5 { color: #f00; text-shadow: 0 0 10px #f00, 0 0 20px #f00; }
        .dvd-bounce.color-6 { color: #00f; text-shadow: 0 0 10px #00f, 0 0 20px #00f; }

        .calculator-container {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
        }
        .calculator-container.show {
            opacity: 1;
            visibility: visible;
        }

        .calc-wrapper {
            background: rgba(20,20,20,0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1001;
        }

        .calc-title {
            font-size: 1.3rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
        }

        .section-title {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            margin: 18px 0 12px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .medal-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .medal-option {
            position: relative;
        }
        .medal-option input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .medal-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            aspect-ratio: 1;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.02);
        }
        .medal-option label img {
            width: 75%;
            height: 75%;
            object-fit: contain;
        }
        .medal-option label.none-label {
            font-size: 1.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.6);
        }
        .medal-option input:checked + label {
            border-color: transparent;
            background: rgba(255,255,255,0.06);
        }
        .medal-option input#curr-0:checked + label.none-label {
            animation: slowRgb 10s linear infinite;
        }
        @keyframes slowRgb {
            0% { text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; color: #ff6666; }
            16% { text-shadow: 0 0 10px #ff8800, 0 0 20px #ff8800; color: #ffaa66; }
            33% { text-shadow: 0 0 10px #ffff00, 0 0 20px #ffff00; color: #ffff66; }
            50% { text-shadow: 0 0 10px #00ff00, 0 0 20px #00ff00; color: #66ff66; }
            66% { text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; color: #66ffff; }
            83% { text-shadow: 0 0 10px #0088ff, 0 0 20px #0088ff; color: #66aaff; }
            100% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; color: #ff66ff; }
        }
        .medal-option label:hover {
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-2px);
            background: rgba(255,255,255,0.04);
        }

        .current-xp-display {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 16px;
            margin: 16px 0;
            text-align: center;
        }
        .xp-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }
        .xp-value {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(90deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 4px 0;
        }
        .xp-progress {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        .xp-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            position: relative;
        }
        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0088ff, #ff00ff, #ff0000);
            background-size: 400% 100%;
            animation: slowRgbBar 10s linear infinite;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        @keyframes slowRgbBar {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin: 18px 0;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .input-field label {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.6);
        }
        .input-field input {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            padding: 10px 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-field input:focus {
            border-color: rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.08);
        }
        .input-field input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .mode-select, .strategy-select {
            display: flex;
            gap: 10px;
            margin: 10px 0 18px;
        }
        .mode-btn, .strategy-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-btn.active, .strategy-btn.active {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
            font-weight: 600;
        }
        .mode-btn:hover, .strategy-btn:hover {
            border-color: rgba(255,255,255,0.4);
        }
        .strategy-btn.active.hardcore {
            border-color: #f59e0b;
            background: rgba(245, 158, 11, 0.2);
        }
        .strategy-btn.active.smart {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.2);
        }

        .calc-buttons {
            display: flex;
            gap: 12px;
            margin: 22px 0 14px;
        }
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-calc {
            background: #fff;
            color: #0a0a0a;
        }
        .btn-calc:hover {
            background: rgba(255,255,255,0.92);
            transform: translateY(-2px);
        }
        .btn-reset {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-reset:hover {
            background: rgba(255,255,255,0.12);
        }

        .results {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 16px;
            margin-top: 10px;
            display: none;
        }
        .results.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .result-row:last-child {
            border-bottom: none;
        }
        .result-row .value {
            font-weight: 600;
            color: #fff;
        }
        .result-row.highlight {
            color: #4ade80;
            font-weight: 600;
            padding-top: 12px;
            margin-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .result-row.warning {
            color: #fbbf24;
        }
        .result-note {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            margin-top: 10px;
            line-height: 1.4;
        }
        .strategy-output {
            margin-top: 16px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            border-left: 3px solid;
        }
        .strategy-output.hardcore {
            border-left-color: #f59e0b;
        }
        .strategy-output.smart {
            border-left-color: #10b981;
        }
        .strategy-output h4 {
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #fff;
        }
        .strategy-output p {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.7);
            margin: 4px 0;
        }

        .error {
            color: #f87171;
            font-size: 0.75rem;
            margin-top: 4px;
            display: none;
        }
        .error.show { display: block; }

        .flash {
            position: fixed; inset: 0; background: rgba(255,255,255,0.2); z-index: 2000;
            pointer-events: none; opacity: 0; animation: flashAnim 0.4s ease-out forwards;
        }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        .add-dvd-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 3px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            z-index: 9997;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.1);
            overflow: hidden;
            animation: dimRgb 8s linear infinite;
        }
        
        @keyframes dimRgb {
            0% { border-color: rgba(255,100,100,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(255,100,100,0.2); }
            16% { border-color: rgba(255,180,100,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(255,180,100,0.2); }
            33% { border-color: rgba(255,255,100,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(255,255,100,0.2); }
            50% { border-color: rgba(100,255,100,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(100,255,100,0.2); }
            66% { border-color: rgba(100,220,255,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(100,220,255,0.2); }
            83% { border-color: rgba(140,100,255,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(140,100,255,0.2); }
            100% { border-color: rgba(255,100,200,0.4); box-shadow: 0 4px 15px rgba(0,0,0,0.5), 0 0 20px rgba(255,100,200,0.2); }
        }
        
        .add-dvd-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .add-dvd-btn:active::before {
            width: 300px;
            height: 300px;
        }
        
        .add-dvd-btn:hover {
            transform: translateY(-3px) scale(1.05);
            border-color: rgba(255,255,255,0.8);
            box-shadow: 0 8px 25px rgba(0,0,0,0.6), inset 0 0 30px rgba(255,255,255,0.2);
        }
        
        .add-dvd-btn:active {
            transform: translateY(-1px) scale(0.95);
        }
        
        .add-dvd-btn span {
            position: relative;
            z-index: 1;
            display: block;
            transition: transform 0.3s;
        }
        
        .add-dvd-btn:hover span {
            transform: rotate(90deg);
        }

        @media (max-width: 640px) {
            .medal-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .input-grid { grid-template-columns: 1fr; }
            .calc-wrapper { padding: 20px 16px; }
            .dvd-bounce { font-size: 12px; }
            .add-dvd-btn { width: 50px; height: 50px; font-size: 28px; bottom: 20px; right: 20px; }
            .mode-select, .strategy-select { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-ring" id="cursor-ring"></div>

    <audio id="my-sound" src="click.mp3" preload="auto"></audio>

    <div id="dvd-container"></div>

    <button class="add-dvd-btn" id="addDvdBtn">
        <span>^·^</span>
    </button>

    <div class="main-container" id="main-container">
        <div class="text-wrapper" id="text-wrapper">
            <span class="letter">D</span>
            <span class="letter">S</span>
            <span class="letter">A</span>
            <span class="letter">N</span>
            <span class="letter">C</span>
        </div>

        <div class="social-links">
            <a href="https://youtube.com/@hif" target="_blank" class="social-link youtube">
                <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                <span class="tooltip">YouTube</span>
            </a>

                <span class="tooltip">Discord</span>
            </a>
        </div>
    </div>

    <div class="calculator-container" id="calculator">
        <div class="calc-wrapper">
            <h2 class="calc-title">CS2 Калькич</h2>

            <div class="section-title">Текущая медаль</div>
            <div class="medal-row">
                <div class="medal-option">
                    <input type="radio" id="curr-0" name="current" value="0" checked>
                    <label for="curr-0" class="none-label">✕</label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="curr-1" name="current" value="1">
                    <label for="curr-1"><img src="https://static.wikia.nocookie.net/cswikia/images/f/f3/Service_medal_2026_lvl1.png/revision/latest?cb=20260123173658" alt="T1"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="curr-2" name="current" value="2">
                    <label for="curr-2"><img src="https://static.wikia.nocookie.net/cswikia/images/4/41/Service_medal_2026_lvl2.png/revision/latest?cb=20260123173716" alt="T2"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="curr-3" name="current" value="3">
                    <label for="curr-3"><img src="https://static.wikia.nocookie.net/cswikia/images/c/c4/Service_medal_2026_lvl3.png/revision/latest?cb=20260123173722" alt="T3"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="curr-4" name="current" value="4">
                    <label for="curr-4"><img src="https://static.wikia.nocookie.net/cswikia/images/5/57/Service_medal_2026_lvl4.png/revision/latest?cb=20260123173730" alt="T4"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="curr-5" name="current" value="5">
                    <label for="curr-5"><img src="https://static.wikia.nocookie.net/cswikia/images/c/c6/Service_medal_2026_lvl5.png/revision/latest?cb=20260123173737" alt="T5"></label>
                </div>
            </div>

            <div class="section-title">Целевая медаль</div>
            <div class="medal-row">
                <div class="medal-option">
                    <input type="radio" id="targ-1" name="target" value="1">
                    <label for="targ-1"><img src="https://static.wikia.nocookie.net/cswikia/images/f/f3/Service_medal_2026_lvl1.png/revision/latest?cb=20260123173658" alt="T1"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="targ-2" name="target" value="2">
                    <label for="targ-2"><img src="https://static.wikia.nocookie.net/cswikia/images/4/41/Service_medal_2026_lvl2.png/revision/latest?cb=20260123173716" alt="T2"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="targ-3" name="target" value="3">
                    <label for="targ-3"><img src="https://static.wikia.nocookie.net/cswikia/images/c/c4/Service_medal_2026_lvl3.png/revision/latest?cb=20260123173722" alt="T3"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="targ-4" name="target" value="4">
                    <label for="targ-4"><img src="https://static.wikia.nocookie.net/cswikia/images/5/57/Service_medal_2026_lvl4.png/revision/latest?cb=20260123173730" alt="T4"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="targ-5" name="target" value="5">
                    <label for="targ-5"><img src="https://static.wikia.nocookie.net/cswikia/images/c/c6/Service_medal_2026_lvl5.png/revision/latest?cb=20260123173737" alt="T5"></label>
                </div>
                <div class="medal-option">
                    <input type="radio" id="targ-6" name="target" value="6">
                    <label for="targ-6"><img src="https://static.wikia.nocookie.net/cswikia/images/b/b6/Service_medal_2026_lvl6.png/revision/latest?cb=20260123173743" alt="T6"></label>
                </div>
            </div>

            <div class="current-xp-display" id="xpDisplay" style="display: none;">
                <div class="xp-label">Текущий XP</div>
                <div class="xp-value" id="currentXPValue">0</div>
                <div class="xp-progress" id="xpProgress">до целевой медали: 0 XP</div>
                <div class="xp-bar">
                    <div class="xp-bar-fill" id="xpBarFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="section-title">Прогресс</div>
            <div class="input-grid">
                <div class="input-field">
                    <label for="startLevel">Уровень профиля</label>
                    <input type="number" id="startLevel" min="1" max="40" value="1">
                </div>
                <div class="input-field">
                    <label for="startXP">XP в текущем уровне</label>
                    <input type="number" id="startXP" min="0" max="4999" value="0">
                </div>
            </div>

            <div class="section-title">Режим прокачки</div>
            <div class="mode-select">
                <div class="mode-btn active" data-mode="casual" onclick="setMode('casual')">Обычный (Casual)</div>
                <div class="mode-btn" data-mode="dm" onclick="setMode('dm')">Бой насмерть (DM)</div>
            </div>

            <div class="section-title">Стратегия фарма</div>
            <div class="strategy-select">
                <div class="strategy-btn active hardcore" data-strategy="hardcore" onclick="setStrategy('hardcore')">Без остановки</div>
                <div class="strategy-btn smart" data-strategy="smart" onclick="setStrategy('smart')">До пониженного</div>
            </div>

            <div class="input-grid">
                <div class="input-field">
                    <label for="avgScore">Очков за матч (Score)</label>
                    <input type="number" id="avgScore" min="1" value="100">
                    <div class="error" id="err-score"></div>
                </div>
                <div class="input-field">
                    <label for="matchDuration">Время матча (минут)</label>
                    <input type="number" id="matchDuration" min="5" max="60" value="15">
                </div>
                <div class="input-field">
                    <label for="targetXP">Сколько XP нужно (цель)</label>
                    <input type="number" id="targetXP" min="1000" value="5000">
                </div>
            </div>

            <div class="calc-buttons">
                <button class="btn btn-calc" onclick="calculateMedal()">Рассчитать</button>
                <button class="btn btn-reset" onclick="closeCalculator()">Закрыть</button>
            </div>

            <div class="results" id="results">
                <div class="result-row"><span>Текущий XP:</span><span class="value" id="res-current-xp">0</span></div>
                <div class="result-row"><span>Нужно XP:</span><span class="value" id="res-total">0</span></div>
                <div class="result-row"><span>XP за матч (норма):</span><span class="value" id="res-per-match">0</span></div>
                <div class="result-row warning"><span>XP за матч (пониженный):</span><span class="value" id="res-penalty">0</span></div>
                
                <div id="strategyResults"></div>
                
                <div class="result-note" id="res-note"></div>
            </div>
        </div>
    </div>

    <script>
        const cursorDot = document.getElementById('cursor-dot');
        const cursorRing = document.getElementById('cursor-ring');
        const mainContainer = document.getElementById('main-container');
        const textWrapper = document.getElementById('text-wrapper');
        const calculator = document.getElementById('calculator');
        const dvdContainer = document.getElementById('dvd-container');
        const addDvdBtn = document.getElementById('addDvdBtn');

        const dvdFrames = [
            '(\\^·^)\\',
            '/(^·^)\\',
            '/(^·^/)',
            '(\\^·^)\\',
            '(/^·^)/',
            '\\(^·^)/',
            '\\(^·^\\)',
            '(/^·^)/'
        ];
        
        const dvdAnimations = [];
        let currentMode = 'casual';
        let currentStrategy = 'hardcore';

        class DVDAnimation {
            constructor() {
                this.element = document.createElement('div');
                this.element.className = 'dvd-bounce color-' + (Math.floor(Math.random() * 6) + 1);
                this.element.textContent = dvdFrames[0];
                dvdContainer.appendChild(this.element);
                
                this.x = Math.random() * (window.innerWidth - 100);
                this.y = Math.random() * (window.innerHeight - 100);
                this.speedX = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
                this.speedY = (Math.random() * 1.5 + 0.5) * (Math.random() > 0.5 ? 1 : -1);
                this.frameIndex = 0;
                this.colorIndex = Math.floor(Math.random() * 6) + 1;
                
                this.updatePosition();
                this.startAnimation();
                this.startFrameCycle();
            }
            
            updatePosition() {
                const rect = this.element.getBoundingClientRect();
                const maxX = window.innerWidth - rect.width;
                const maxY = window.innerHeight - rect.height;
                
                this.x += this.speedX;
                this.y += this.speedY;
                
                if (this.x <= 0 || this.x >= maxX) {
                    this.speedX = -this.speedX;
                    this.x = Math.max(0, Math.min(this.x, maxX));
                    this.changeColor();
                }
                if (this.y <= 0 || this.y >= maxY) {
                    this.speedY = -this.speedY;
                    this.y = Math.max(0, Math.min(this.y, maxY));
                    this.changeColor();
                }
                
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
            }
            
            changeColor() {
                this.colorIndex = (this.colorIndex % 6) + 1;
                this.element.className = 'dvd-bounce color-' + this.colorIndex;
            }
            
            startAnimation() {
                const animate = () => {
                    this.updatePosition();
                    requestAnimationFrame(animate);
                };
                animate();
            }
            
            startFrameCycle() {
                const cycle = () => {
                    this.frameIndex = (this.frameIndex + 1) % dvdFrames.length;
                    this.element.textContent = dvdFrames[this.frameIndex];
                    setTimeout(cycle, 150);
                };
                cycle();
            }
            
            remove() {
                this.element.remove();
            }
        }

        dvdAnimations.push(new DVDAnimation());

        addDvdBtn.addEventListener('click', () => {
            playClickSound();
            dvdAnimations.push(new DVDAnimation());
        });

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('input[name="current"], input[name="target"], #startLevel, #startXP').forEach(el => {
                el.addEventListener('change', updateXPDisplay);
            });
        });

        const XP_PER_LEVEL = 5000;
        const XP_TO_RANK40 = 195000;
        const MAX_XP = 1170000;
        const MEDAL_XP = [0, 195000, 390000, 585000, 780000, 975000, 1170000];
        const WEEKLY_THRESHOLD = 11166;
        const WEEKLY_HOURS_LIMIT = 40;

        const MODE_CONFIG = {
            casual: { mult: 4.0, penaltyMult: 0.7, cap: Infinity, penaltyCap: Infinity, name: 'Обычный' },
            dm: { mult: 0.2, penaltyMult: 0.035, cap: 75, penaltyCap: 13, name: 'Deathmatch' }
        };

        function playClickSound() {
            const sound = document.getElementById('my-sound');
            sound.currentTime = 0;
            sound.play().catch(e => console.log('Audio error:', e));
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add('active');
            
            const scoreInput = document.getElementById('avgScore');
            
            if (mode === 'dm') {
                scoreInput.max = 375;
                scoreInput.value = Math.min(parseInt(scoreInput.value) || 100, 375);
            } else {
                scoreInput.max = 9999;
            }
        }

        function setStrategy(strategy) {
            currentStrategy = strategy;
            document.querySelectorAll('.strategy-btn').forEach(btn => {
                btn.classList.remove('active', 'hardcore', 'smart');
            });
            document.querySelector(`.strategy-btn[data-strategy="${strategy}"]`).classList.add('active', strategy);
            
            // Отключаем поле XP если выбрана стратегия "До пониженного"
            const targetXPInput = document.getElementById('targetXP');
            if (strategy === 'smart') {
                targetXPInput.disabled = true;
                targetXPInput.value = WEEKLY_THRESHOLD;
            } else {
                targetXPInput.disabled = false;
            }
        }

        function getCurrentXP() {
            const currMedal = parseInt(document.querySelector('input[name="current"]:checked').value);
            const startLevel = parseInt(document.getElementById('startLevel').value) || 1;
            const startXP = parseInt(document.getElementById('startXP').value) || 0;
            
            const profileXP = (startLevel - 1) * XP_PER_LEVEL + startXP;
            const totalXP = MEDAL_XP[currMedal] + Math.min(profileXP, XP_TO_RANK40);
            
            return {
                total: totalXP,
                medal: currMedal,
                nextMedal: currMedal < 6 ? MEDAL_XP[currMedal + 1] : null,
                toNextMedal: currMedal < 6 ? MEDAL_XP[currMedal + 1] - totalXP : 0
            };
        }

        function calculateXPPerMatch(score, mode, penalized) {
            const cfg = MODE_CONFIG[mode];
            
            if (mode === 'dm') {
                if (penalized) {
                    return Math.min(Math.floor(score * cfg.penaltyMult), cfg.penaltyCap);
                } else {
                    return Math.min(Math.floor(score * cfg.mult), cfg.cap);
                }
            } else if (mode === 'casual') {
                if (penalized) {
                    return Math.round(score * cfg.penaltyMult);
                } else {
                    return Math.round(score * cfg.mult);
                }
            }
            return 0;
        }

        // Стратегия 1: Фарм БЕЗ ОСТАНОВКИ
        function calculateHardcoreFarm(neededXP, avgScore, mode, matchDuration) {
            let accumulatedXP = 0;
            let totalMatches = 0;
            let totalTimeMinutes = 0;
            let weeklyBaseXPEarned = 0;

            while (accumulatedXP < neededXP) {
                let isPenalized = weeklyBaseXPEarned >= WEEKLY_THRESHOLD;
                let xpGained = calculateXPPerMatch(avgScore, mode, isPenalized);
                
                accumulatedXP += xpGained;
                totalMatches++;
                totalTimeMinutes += matchDuration;

                if (isPenalized) {
                    weeklyBaseXPEarned += (xpGained / 0.175);
                } else {
                    weeklyBaseXPEarned += xpGained;
                }

                if (totalTimeMinutes % (WEEKLY_HOURS_LIMIT * 60) < matchDuration) {
                    weeklyBaseXPEarned = 0;
                }
            }

            return {
                matches: totalMatches,
                hours: (totalTimeMinutes / 60).toFixed(1),
                weeks: Math.ceil(totalTimeMinutes / (WEEKLY_HOURS_LIMIT * 60))
            };
        }

        // Стратегия 2: Фарм ТОЛЬКО ДО ПОНИЖЕННОГО
        function calculateSmartFarm(neededXP, avgScore, mode, matchDuration) {
            let accumulatedXP = 0;
            let totalMatches = 0;
            let totalTimeMinutes = 0;
            let weeksRequired = 0;

            const xpPerNormalMatch = calculateXPPerMatch(avgScore, mode, false);
            
            if (xpPerNormalMatch <= 0) return { matches: Infinity, hours: Infinity, weeks: Infinity };

            const matchesPerWeek = Math.ceil(WEEKLY_THRESHOLD / xpPerNormalMatch);
            const xpPerWeek = matchesPerWeek * xpPerNormalMatch;

            while (accumulatedXP < neededXP) {
                weeksRequired++;
                
                const remainingXP = neededXP - accumulatedXP;
                if (remainingXP <= xpPerWeek) {
                    const finalMatches = Math.ceil(remainingXP / xpPerNormalMatch);
                    totalMatches += finalMatches;
                    totalTimeMinutes += finalMatches * matchDuration;
                    accumulatedXP += finalMatches * xpPerNormalMatch;
                    break;
                }

                totalMatches += matchesPerWeek;
                totalTimeMinutes += matchesPerWeek * matchDuration;
                accumulatedXP += xpPerWeek;
            }

            return {
                matches: totalMatches,
                hours: (totalTimeMinutes / 60).toFixed(1),
                weeks: weeksRequired
            };
        }

        function updateXPDisplay() {
            const currentRadio = document.querySelector('input[name="current"]:checked');
            const targetRadio = document.querySelector('input[name="target"]:checked');
            
            if (!currentRadio || !targetRadio) return;
            
            const currMedal = parseInt(currentRadio.value);
            const targetMedal = parseInt(targetRadio.value);
            
            if (currMedal === targetMedal) return;
            
            const xpData = getCurrentXP();
            
            const xpDisplay = document.getElementById('xpDisplay');
            const xpValue = document.getElementById('currentXPValue');
            const xpProgress = document.getElementById('xpProgress');
            const xpBarFill = document.getElementById('xpBarFill');
            
            const targetXP = MEDAL_XP[targetMedal];
            const xpNeeded = Math.max(0, targetXP - xpData.total);
            const progress = (xpData.total / MAX_XP) * 100;
            
            xpDisplay.style.display = 'block';
            xpValue.textContent = xpData.total.toLocaleString('ru-RU') + ' XP';
            
            if (xpNeeded > 0) {
                xpProgress.textContent = `до ${targetMedal} медали: ${xpNeeded.toLocaleString('ru-RU')} XP`;
            } else {
                xpProgress.textContent = `максимальная медаль достигнута`;
            }
            
            xpBarFill.style.width = Math.min(progress, 100) + '%';
        }

        document.addEventListener('mousemove', e => {
            cursorDot.style.left = e.clientX + 'px'; 
            cursorDot.style.top = e.clientY + 'px';
            setTimeout(() => { 
                cursorRing.style.left = e.clientX + 'px'; 
                cursorRing.style.top = e.clientY + 'px'; 
            }, 8);
        });
        document.addEventListener('mousedown', () => {
            cursorDot.style.width = '6px'; cursorDot.style.height = '6px';
            cursorRing.style.width = '24px'; cursorRing.style.height = '24px'; 
            cursorRing.style.borderColor = 'rgba(255,255,255,0.85)';
        });
        document.addEventListener('mouseup', () => {
            cursorDot.style.width = '8px'; cursorDot.style.height = '8px';
            cursorRing.style.width = '30px'; cursorRing.style.height = '30px'; 
            cursorRing.style.borderColor = 'rgba(255,255,255,0.3)';
        });

        textWrapper.addEventListener('click', () => {
            playClickSound();
            const flash = document.createElement('div'); 
            flash.className = 'flash'; 
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 400);
            mainContainer.classList.add('hidden');
            setTimeout(() => {
                calculator.classList.add('show');
                updateXPDisplay();
            }, 300);
        });

        function closeCalculator() {
            calculator.classList.remove('show');
            document.getElementById('results').classList.remove('show');
            mainContainer.classList.remove('hidden');
        }

        function calculateMedal() {
            document.querySelectorAll('.error').forEach(el => el.classList.remove('show'));

            const currentRadio = document.querySelector('input[name="current"]:checked');
            const targetRadio = document.querySelector('input[name="target"]:checked');
            
            if (!currentRadio || !targetRadio) {
                alert('Выберите текущую и целевую медаль!');
                return;
            }

            const currMedal = parseInt(currentRadio.value);
            const targetMedal = parseInt(targetRadio.value);
            const startLevel = parseInt(document.getElementById('startLevel').value) || 1;
            const startXP = parseInt(document.getElementById('startXP').value) || 0;
            const avgScore = parseInt(document.getElementById('avgScore').value) || 100;
            const matchDuration = parseInt(document.getElementById('matchDuration').value) || 15;
            const targetXPInput = parseInt(document.getElementById('targetXP').value) || 0;

            if (currentMode === 'dm' && avgScore > 375) {
                document.getElementById('err-score').textContent = 'В ДМ максимум 375 очков имеет смысл';
                document.getElementById('err-score').classList.add('show');
                return;
            }

            if (targetMedal <= currMedal && targetXPInput === 0) {
                alert('Выберите медаль выше текущей или укажите количество XP!');
                return;
            }

            const currentProfileXP = (startLevel - 1) * XP_PER_LEVEL + startXP;
            const currentTotalXP = MEDAL_XP[currMedal] + Math.min(currentProfileXP, XP_TO_RANK40);
            
            let xpNeeded = 0;
            if (currentStrategy === 'smart') {
                
                xpNeeded = WEEKLY_THRESHOLD;
            } else if (targetXPInput > 0) {
                xpNeeded = targetXPInput;
            } else {
                xpNeeded = Math.max(0, MEDAL_XP[targetMedal] - currentTotalXP);
            }

            const xpNormal = calculateXPPerMatch(avgScore, currentMode, false);
            const xpPenalty = calculateXPPerMatch(avgScore, currentMode, true);
            
            
            const hardcoreResults = calculateHardcoreFarm(xpNeeded, avgScore, currentMode, matchDuration);
            const smartResults = calculateSmartFarm(xpNeeded, avgScore, currentMode, matchDuration);

            let note = '';
            if (currentMode === 'dm') {
                note = `⚠️ В ДМ после 11,166 XP/неделю вы будете получать всего ${xpPenalty} XP за матч. На пониженном опыте фарм крайне неэффективен.`;
            } else {
                note = `⚠️ После 11,166 XP/неделю множитель снижается до ×0.175. При счёте ${avgScore} вы получаете ${xpNormal} XP до лимита и только ${xpPenalty} XP после.`;
            }

            document.getElementById('res-current-xp').textContent = currentTotalXP.toLocaleString('ru-RU') + ' XP';
            document.getElementById('res-total').textContent = xpNeeded.toLocaleString('ru-RU') + ' XP';
            document.getElementById('res-per-match').textContent = xpNormal + ' XP';
            document.getElementById('res-penalty').textContent = xpPenalty + ' XP';
            
            
            const strategyResults = document.getElementById('strategyResults');
            
            if (currentStrategy === 'hardcore') {
                strategyResults.innerHTML = `
                    <div class="strategy-output hardcore">
                        <h4>Итог:</h4>
                        <p><strong>Матчей:</strong> ${hardcoreResults.matches}</p>
                        <p><strong>Времени игры:</strong> ${hardcoreResults.hours} ч.</p>
                        <p><strong>Игровых недель:</strong> ${hardcoreResults.weeks} (по ${WEEKLY_HOURS_LIMIT}ч/нед)</p>
                    </div>
                `;
            } else {
                strategyResults.innerHTML = `
                    <div class="strategy-output smart">
                        <h4>Итог:</h4>
                        <p><strong>Матчей:</strong> ${smartResults.matches}</p>
                        <p><strong>Чистого времени игры:</strong> ${smartResults.hours} ч.</p>
                        <p><strong>Пройдет реального времени:</strong> ${smartResults.weeks} нед. (до среды)</p>
                    </div>
                `;
            }
            
            document.getElementById('res-note').textContent = note;
            
            document.getElementById('results').classList.add('show');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.addEventListener('resize', () => {
            dvdAnimations.forEach(anim => {
                const rect = anim.element.getBoundingClientRect();
                anim.x = Math.min(anim.x, window.innerWidth - rect.width);
                anim.y = Math.min(anim.y, window.innerHeight - rect.height);
            });
        });
    </script>
</body>
</html>
